name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "github-pages-deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SYNC_ENDPOINT: ${{ secrets.VITE_SYNC_ENDPOINT }}
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Validate required env
        run: |
          if [ -z "$VITE_SYNC_ENDPOINT" ]; then
            echo "Missing secret: VITE_SYNC_ENDPOINT"
            exit 1
          fi
          if [ -z "$VITE_FIREBASE_API_KEY" ]; then
            echo "Missing secret: VITE_FIREBASE_API_KEY"
            exit 1
          fi
          if [ -z "$VITE_FIREBASE_AUTH_DOMAIN" ]; then
            echo "Missing secret: VITE_FIREBASE_AUTH_DOMAIN"
            exit 1
          fi
          if [ -z "$VITE_FIREBASE_PROJECT_ID" ]; then
            echo "Missing secret: VITE_FIREBASE_PROJECT_ID"
            exit 1
          fi
          if [ -z "$VITE_FIREBASE_APP_ID" ]; then
            echo "Missing secret: VITE_FIREBASE_APP_ID"
            exit 1
          fi

      - name: Build app
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
